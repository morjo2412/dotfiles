# Design BlueInk - Fuzzel Configuration

[main]
font=Iosevka Nerd Font Mono:weight=bold:size=14
prompt="❯ "

# Visual app cues
icons-enabled=yes 

# Search behavior
fuzzy=yes
match-mode=fzf

# Terminal execution handoff
terminal=kitty -e

# Cache sorted entries for faster subsequent lookups
cache=~/.cache/fuzzel/cache

# UI Geometry
lines=10
width=45
horizontal-pad=24
vertical-pad=20
inner-pad=8
line-height=24

[colors]
background=e6ded5fa
text=022164ff
match=1c3773ff
selection=d4c9bcff
selection-text=010b22ff
selection-match=010b22ff
border=022164ff

[border]
width=2
radius=8

[dmenu]
# Dmenu compatibility mode for external script piping
mode=text
exit-immediately-if-empty=yes

[keybindings]
# Structural navigation overrides (Emacs/Vim-like supported)
# cancel=Escape Control+g
# execute=Return KP_Enter
# execute-or-next=Tab
# cursor-left=Left Control+b
# cursor-right=Right Control+f
